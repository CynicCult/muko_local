<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <title>Muko AI</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #ffffff;
      --panel: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #4f46e5;
      --accent-2: #22c55e;
      --border: #e2e8f0;
      --app-width: 468px;
      --app-height: 720px;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      width: var(--app-width);
      height: var(--app-height);
      overflow: hidden;
    }
    .page {
      display: none !important;
      width: 100%;
      height: 100%;
      padding: 24px;
      overflow: hidden;
    }
    .page.active {
      display: block !important;
    }
    .landing {
      background: #ffffff;
    }
    .landing.active {
      display: flex !important;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 48px;
      overflow-y: auto;
    }
    .landing-header {
      position: absolute;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 18px;
      font-weight: 600;
      color: var(--text);
    }
    .login-container {
      max-width: 360px;
      width: 100%;
      display: grid;
      gap: 24px;
    }
    .login-container h1 {
      margin: 0;
      font-size: 32px;
      font-weight: 600;
      text-align: center;
      color: var(--text);
    }
    .subtitle {
      margin: 0;
      text-align: center;
      color: var(--muted);
      font-size: 15px;
    }
    .login-form {
      display: grid;
      gap: 12px;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff !important;
      color: #1a1a1a !important;
      border: 1px solid var(--border) !important;
    }
    .google-btn:hover {
      background: #f8fafc !important;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      margin: 8px 0;
    }
    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .button {
      border-radius: 10px;
      padding: 12px 16px;
      font-weight: 600;
      cursor: pointer;
      font-size: 15px;
      transition: all 0.2s ease;
      border-style: solid;
      border-width: 1px;
    }
    .button.primary-dark {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    .button.primary-dark:hover {
      border-radius: 24px;
      background: #2d5f4f;
      border-color: #2d5f4f;
    }
    .button.secondary-dark {
      background: #1a1a1a;
      color: white;
      border-color: #1a1a1a;
    }
    .button.secondary-dark:hover {
      border-radius: 24px;
      background: #2d5f4f;
      border-color: #2d5f4f;
    }
    .button.ghost-dark {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
    }
    .button.ghost-dark:hover {
      border-radius: 24px;
    }
    .button.secondary {
      background: #eef2ff;
      color: var(--accent);
      border-color: #eef2ff;
    }
    .button.secondary:hover {
      border-radius: 24px;
      background: #2d5f4f;
      border-color: #2d5f4f;
      color: white;
    }
    .button.ghost {
      background: transparent;
      border-color: var(--border);
      color: var(--text);
    }
    .button.ghost:hover {
      border-radius: 24px;
      background: #2d5f4f;
      border-color: #2d5f4f;
      color: white;
    }
    .cookie-box {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15), 0 10px 40px rgba(0, 0, 0, 0.08);
    }
    .cookie-notice {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 11px;
      line-height: 1.4;
      color: var(--text);
    }
    .cookie-icon {
      flex-shrink: 0;
      font-size: 14px;
    }
    .cookie-text a {
      color: var(--text);
      text-decoration: underline;
    }
    .cookie-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
      height: calc(100% - 48px);
      overflow: hidden;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: relative;
    }
    .logo {
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .profile-container {
      position: relative;
    }
    .profile-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, #4285f4 0deg 90deg, #ea4335 90deg 180deg, #fbbc05 180deg 270deg, #34a853 270deg 360deg);
      padding: 2px;
      cursor: pointer;
      transition: transform 0.2s ease;
    }
    .profile-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      background: white;
    }
    .profile-dropdown {
      display: none;
      position: absolute;
      top: 50px;
      right: 0;
      background: white;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      min-width: 220px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      z-index: 1000;
    }
    .profile-dropdown.active {
      display: block;
    }
    .profile-info {
      text-align: left;
    }
    .profile-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .profile-email {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .profile-status {
      display: inline-block;
      font-size: 12px;
      font-weight: 600;
      color: #4285f4;
      background: #e8f0fe;
      padding: 4px 10px;
      border-radius: 12px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .toolbar-button {
      border: 1px solid var(--border);
      background: #ffffff;
      border-radius: 12px;
      padding: 10px;
      display: grid;
      gap: 6px;
      justify-items: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      transition: all 0.2s ease;
      min-height: 72px;
    }
    .toolbar-button img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }
    .toolbar-button:hover {
      border-radius: 20px;
      border-color: #2d5f4f;
      color: #2d5f4f;
    }
    .toolbar-button.active {
      background: #eef2ff;
      border-color: #c7d2fe;
      color: #4338ca;
    }
    .grid {
      display: grid;
      gap: 12px;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }
    .panel h3 {
      margin: 0 0 8px;
      font-size: 14px;
    }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .input {
      background: #ffffff;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      width: 100%;
    }
    /* Slider removed - divider is draggable */
    .preview {
      position: relative;
      background: #f1f5f9;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      height: 280px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }
    .preview img {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      object-fit: cover;
    }
    .preview .after {
      clip-path: inset(0 50% 0 0);
    }
    .preview-divider {
      position: absolute;
      top: 0;
      left: 50%;
      width: 4px;
      height: 100%;
      background: white;
      transform: translateX(-50%);
      z-index: 10;
      display: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      cursor: ew-resize;
    }
    .fullscreen-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      width: 40px;
      height: 40px;
      background: rgba(0, 0, 0, 0.6);
      border: none;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 15;
      transition: background 0.2s;
    }
    .fullscreen-btn:hover {
      background: rgba(0, 0, 0, 0.8);
    }
    .footer {
      margin-top: 12px;
      font-size: 12px;
      color: var(--muted);
    }
    .loader-page {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .loader-page.hidden {
      display: none;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e2e8f0;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
  
</head>
<body>
  <div class="loader-page" id="loaderPage">
    <div id="loaderContent">
      <div class="spinner" id="spinner"></div>
    </div>
  </div>
  <section class="page landing active" id="landingPage">
    <div class="landing-header">
      <div class="brand-logo">
        <img src="assets/logo.svg" width="32" height="32" alt="Muko" />
        <span>muko</span>
      </div>
    </div>

    <div class="login-container">
      <h1>Selamat datang di Muko</h1>
      <p class="subtitle">Masuk atau daftar untuk mulai.</p>
      
      <div class="login-form">
        <button class="button primary-dark google-btn" onclick="handleGoogleSignIn()">
          <svg width="18" height="18" viewBox="0 0 18 18" style="margin-right: 8px;">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
            <path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707 0-.593.102-1.17.282-1.709V4.958H.957C.347 6.173 0 7.548 0 9c0 1.452.348 2.827.957 4.042l3.007-2.335z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
          </svg>
          Lanjutkan dengan Google
        </button>
      </div>
    </div>
    
    <div class="cookie-box" style="position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); max-width: 360px; width: calc(100% - 48px);">
      <div class="cookie-notice">
        <div class="cookie-icon">ⓘ</div>
        <div class="cookie-text">
          Kami menggunakan cookie untuk meningkatkan pengalaman Anda dan untuk pemasaran. Baca <a href="#" onclick="muko.openLink()">kebijakan cookie</a> kami atau <a href="#" onclick="muko.openLink()">kelola cookie</a>.
        </div>
      </div>
      <div class="cookie-actions">
        <button class="button secondary-dark" onclick="acceptCookies()">Terima semua</button>
        <button class="button ghost-dark" onclick="rejectCookies()">Tolak semua</button>
      </div>
    </div>
  </section>

  <section class="page" id="mainPage">
    <div class="container">
      <div class="header">
        <div class="logo">
          <img src="assets/logo.svg" width="24" height="24" alt="Muko" style="vertical-align: middle;" />
          MUKO AI
        </div>
        <div class="profile-container">
          <div class="profile-avatar" onclick="toggleProfileDropdown()" id="profileAvatar">
            <img src="" alt="Profile" id="profilePhoto" />
          </div>
          <div class="profile-dropdown" id="profileDropdown">
            <div class="profile-info">
              <div class="profile-name" id="profileName">User Name</div>
              <div class="profile-email" id="profileEmail">user@example.com</div>
              <div class="profile-status" id="profileStatus">Free</div>
            </div>
            <button class="button ghost" onclick="handleLogout()" style="width: 100%; margin-top: 12px;">Logout</button>
          </div>
        </div>
      </div>

      <div class="panel grid">
        <div class="preview" id="preview">
          <span id="previewPlaceholder">Klik Capture atau Upload untuk memulai</span>
          <div id="matrixCanvas" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20;"></div>
          <img id="beforeImage" class="before" src="" alt="Before" />
          <img id="afterImage" class="after" src="" alt="After" />
          <div class="preview-divider" id="previewDivider"></div>
          <button class="fullscreen-btn" id="fullscreenBtn" onclick="openFullscreen()" style="display: none;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
            </svg>
          </button>
        </div>
        <!-- Slider removed - divider is now draggable -->
      </div>

      <div class="panel grid">
        <div class="row">
          <button class="button" onclick="muko.captureScene()" style="flex: 1;">Capture Scene</button>
          <button class="button secondary" onclick="muko.uploadImage()" style="flex: 1;">Upload</button>
        </div>
        <button class="button primary-dark" onclick="muko.renderAI()" style="width: 100%;">Render AI</button>
        <button class="button secondary" id="downloadBtn" onclick="muko.downloadResult()" style="display: none; width: 100%;">Download Hasil</button>
      </div>

      <div class="footer" style="text-align: center; color: var(--muted); font-size: 12px;">
        <span id="status">Ready</span>
      </div>
    </div>
  </section>

  <script>
    const landingPage = document.getElementById('landingPage');
    const mainPage = document.getElementById('mainPage');
    const statusEl = document.getElementById('status');
    const afterImage = document.getElementById('afterImage');
    const loaderPage = document.getElementById('loaderPage');
    const loaderContent = document.getElementById('loaderContent');

    // Global state
    let currentUser = null;

    // Loader sequence
    function startLoader() {
      // Simple spinner for 1.5 seconds then hide
      setTimeout(() => {
        loaderPage.classList.add('hidden');
      }, 1500);
    }

    // Start loader on page load
    startLoader();
    
    function showMainPage() {
      landingPage.classList.remove('active');
      mainPage.classList.add('active');
    }

    async function showLandingPage() {
      mainPage.classList.remove('active');
      landingPage.classList.add('active');
    }
    
    // Google Sign-In Handler
    async function handleGoogleSignIn() {
      if (window.sketchup && window.sketchup.start_google_oauth) {
        setStatus('Membuka login Google...');
        window.sketchup.start_google_oauth();
        return;
      }
      showCustomAlert('Login Google tidak tersedia di lingkungan ini.');
    }

    window.onGoogleOAuthSuccess = function(name, email, photoUrl) {
      currentEmail = email || '';
      currentUser = { name: name, email: email, photoUrl: photoUrl };
      
      // Update profile UI
      document.getElementById('profileName').textContent = name || 'User';
      document.getElementById('profileEmail').textContent = email || '';
      document.getElementById('profilePhoto').src = photoUrl || 'assets/account-25.png';
      document.getElementById('profileStatus').textContent = 'Free';
      
      showCustomAlert(`Selamat datang, ${name || email || 'Pengguna'}!`);
      setTimeout(() => showMainPage(), 1200);
    };

    window.onGoogleOAuthError = function(message) {
      showCustomAlert(message || 'Gagal login dengan Google.');
    };
    
    function showCustomAlert(message) {
      const alertBox = document.createElement('div');
      alertBox.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: white;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        z-index: 1000;
        min-width: 300px;
        text-align: center;
      `;
      alertBox.innerHTML = `
        <p style="margin: 0 0 16px; font-size: 15px; color: #0f172a;">${message}</p>
        <button onclick="this.parentElement.remove()" style="
          background: #1a1a1a;
          color: white;
          border: none;
          border-radius: 8px;
          padding: 10px 20px;
          font-weight: 600;
          cursor: pointer;
          font-size: 14px;
        ">OK</button>
      `;
      document.body.appendChild(alertBox);
    }

    function acceptCookies() {
      setStatus('Cookie diterima');
      document.querySelector('.cookie-box').style.display = 'none';
    }

    function rejectCookies() {
      setStatus('Cookie ditolak');
      document.querySelector('.cookie-box').style.display = 'none';
    }

    const previewDivider = document.getElementById('previewDivider');
    const fullscreenBtn = document.getElementById('fullscreenBtn');
    const downloadBtn = document.getElementById('downloadBtn');

    // Make divider draggable
    let isDragging = false;
    const previewContainer = document.querySelector('.preview');
    
    previewDivider.addEventListener('mousedown', (e) => {
      isDragging = true;
      e.preventDefault();
    });
    
    document.addEventListener('mousemove', (e) => {
      if (!isDragging || !previewContainer) return;
      
      const rect = previewContainer.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const percent = (x / rect.width) * 100;
      
      if (percent >= 0 && percent <= 100) {
        afterImage.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
        previewDivider.style.left = `${percent}%`;
      }
    });
    
    document.addEventListener('mouseup', () => {
      isDragging = false;
    });

    const muko = {
      openLink: () => {
        if (window.sketchup) {
          window.sketchup.open_link();
        }
      },
      loginGoogle: () => {
        setStatus('Login Google (placeholder)');
        if (window.sketchup) {
          window.sketchup.login_google();
        }
      },
      loginGuest: () => {
        setStatus('Guest mode');
        if (window.sketchup) {
          window.sketchup.login_guest();
        }
      },
      captureScene: () => {
        setStatus('Capture scene...');
        if (window.sketchup) {
          window.sketchup.capture_scene();
        }
      },
      renderAI: () => {
        console.log('[Muko JS] renderAI called');
        const detailValue = 1000; // Default detail value
        setStatus('Memulai render...');
        if (window.sketchup && window.sketchup.render_ai) {
          console.log('[Muko JS] Calling render_ai with detail:', detailValue);
          window.sketchup.render_ai(detailValue);
        } else {
          console.error('[Muko JS] window.sketchup.render_ai not found!');
          setStatus('❌ Render callback tidak tersedia');
        }
      },
      uploadImage: () => {
        setStatus('Memilih gambar...');
        if (window.sketchup && window.sketchup.upload_image) {
          window.sketchup.upload_image();
        }
      },
      downloadResult: () => {
        setStatus('Menyimpan hasil...');
        if (window.sketchup && window.sketchup.download_result) {
          window.sketchup.download_result();
        }
      },
      openMukoAI: () => {
        setStatus('Muko AI aktif');
      },
      openCost: () => {
        setStatus('Cost (RAB) siap digunakan');
      },
      openAccount: () => {
        setStatus('Account detail dibuka');
      }
    };

    function toggleProfileDropdown() {
      const dropdown = document.getElementById('profileDropdown');
      dropdown.classList.toggle('active');
    }

    function handleLogout() {
      document.getElementById('profileDropdown').classList.remove('active');
      showLandingPage();
    }

    // Close dropdown when clicking outside
    document.addEventListener('click', (e) => {
      const profileContainer = document.querySelector('.profile-container');
      const dropdown = document.getElementById('profileDropdown');
      if (profileContainer && !profileContainer.contains(e.target)) {
        dropdown.classList.remove('active');
      }
    });

    function setStatus(text) {
      statusEl.textContent = text;
    }

    window.setBeforeAfter = function(beforePath, afterPath) {
      const placeholder = document.getElementById('previewPlaceholder');
      if (beforePath) {
        document.getElementById('beforeImage').src = beforePath;
        if (placeholder) placeholder.style.display = 'none';
      }
      if (afterPath) {
        document.getElementById('afterImage').src = afterPath;
        if (placeholder) placeholder.style.display = 'none';
        
        // Show divider, fullscreen button, and download button when render completes
        previewDivider.style.display = 'block';
        fullscreenBtn.style.display = 'flex';
        downloadBtn.style.display = 'block';
      }
    };

    window.setStatusText = function(text) {
      setStatus(text);
    };

    // Progress Animation for Rendering
    let progressAnimationId = null;
    let currentProgress = 0;
    const progressOverlay = document.getElementById('matrixCanvas');
    
    function startProgressAnimation() {
      const placeholder = document.getElementById('previewPlaceholder');
      
      // Apply blur pulsing effect to before image
      const beforeImg = document.querySelector('#beforePreview img');
      if (beforeImg) {
        beforeImg.style.transition = 'filter 1s ease-in-out';
        
        let blurIntensity = 0;
        let increasing = true;
        
        if (progressAnimationId) {
          clearInterval(progressAnimationId);
        }
        
        progressAnimationId = setInterval(() => {
          if (increasing) {
            blurIntensity += 2;
            if (blurIntensity >= 10) increasing = false;
          } else {
            blurIntensity -= 2;
            if (blurIntensity <= 0) increasing = true;
          }
          beforeImg.style.filter = `blur(${blurIntensity}px)`;
        }, 100);
      }
    }
    
    function stopProgressAnimation() {
      if (progressAnimationId) {
        clearInterval(progressAnimationId);
        progressAnimationId = null;
      }
      
      // Remove blur effect
      const beforeImg = document.querySelector('#beforePreview img');
      if (beforeImg) {
        beforeImg.style.filter = 'none';
      }
    }
    
    window.startMatrixAnimation = startProgressAnimation;
    window.stopMatrixAnimation = stopProgressAnimation;
    
    function openFullscreen() {
      const afterImg = document.getElementById('afterImage');
      if (!afterImg || !afterImg.src) return;

      // 1. Buat Container Hitam Pekat yang menutupi seluruh Body HTML
      const fsContainer = document.createElement('div');
      fsContainer.id = 'muko-fs-container';
      fsContainer.style.cssText = `
        position: fixed;
        top: 0; left: 0;
        width: 100vw; height: 100vh;
        background: #000;
        z-index: 100000;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      `;

      // 2. Buat Gambar dengan resolusi asli
      const img = document.createElement('img');
      img.src = afterImg.src;
      img.style.cssText = 'max-width: 100%; max-height: 100%; object-fit: contain;';
      
      // 3. Tambahkan tombol "Close" di pojok agar user tidak bingung
      const closeBtn = document.createElement('div');
      closeBtn.innerHTML = '✕ Close Fullscreen';
      closeBtn.style.cssText = 'position: absolute; top: 20px; right: 20px; color: white; background: rgba(0,0,0,0.5); padding: 8px 15px; border-radius: 20px; font-family: sans-serif; font-size: 14px;';

      fsContainer.appendChild(img);
      fsContainer.appendChild(closeBtn);
      document.body.appendChild(fsContainer);

      // 4. PAKSA browser SketchUp untuk masuk ke mode Full Monitor
      const requestFS = fsContainer.requestFullscreen || 
                        fsContainer.webkitRequestFullscreen || 
                        fsContainer.msRequestFullscreen;

      if (requestFS) {
        requestFS.call(fsContainer).catch(err => {
          console.log("Gagal Full Monitor: " + err.message);
        });
      }

      // 5. Fungsi untuk keluar
      const closeFS = () => {
        if (document.exitFullscreen) document.exitFullscreen();
        else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        fsContainer.remove();
      };

      fsContainer.onclick = closeFS;
      
      // Tambahkan listener tombol ESC
      document.onkeydown = (e) => {
        if (e.key === "Escape") closeFS();
      };
    }
    
    window.openFullscreen = openFullscreen;
  </script>
</body>
</html>
